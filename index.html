<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#000;color:#f5f1ea;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
#space{position:fixed;inset:0;z-index:0;pointer-events:none}
nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;padding:14px 20px;gap:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.16em;color:#c9a84c}
.nav-sep{color:#333}
.nav-title{font-family:'Space Mono',monospace;font-size:10px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-exp{font-family:'Space Mono',monospace;font-size:10px;color:#333}
.app{position:relative;z-index:1;display:flex;flex:1;overflow:hidden;height:calc(100vh - 49px)}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)}
.sb-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.4);padding:10px 14px 6px;border-bottom:1px solid rgba(255,255,255,.05)}
.song-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.song-item:hover{background:rgba(255,255,255,.04)}
.song-item.active{background:rgba(201,168,76,.08);border-left:2px solid #c9a84c}
.song-num{font-family:'Space Mono',monospace;font-size:10px;color:#333;width:18px;flex-shrink:0}
.song-title-text{font-size:13px;color:#cec9c1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.song-dl-dot{font-family:'Space Mono',monospace;font-size:9px;color:#4caf82;flex-shrink:0;opacity:0;transition:opacity .3s}
.song-dl-dot.visible{opacity:1}
.song-dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a;flex-shrink:0;transition:all .3s}
.song-dot.on{background:#4caf82;box-shadow:0 0 8px #4caf82}
.player-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 40px;gap:24px;min-width:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}
.now-code{font-family:'Space Mono',monospace;font-size:10px;color:#444;text-align:center;margin-bottom:4px}
.now-title{font-size:24px;text-align:center;color:#f5f1ea;font-weight:300}
.progress-outer{width:100%;max-width:480px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;position:relative}
.progress-outer:hover{height:4px;margin:-1px 0}
.progress-fill{height:100%;background:#c9a84c;border-radius:2px;transition:width .15s linear;pointer-events:none}
.times{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:10px;color:#444;width:100%;max-width:480px;margin-top:6px}
.controls{display:flex;align-items:center;gap:28px}
.ctrl-btn{background:transparent;border:none;color:#444;font-size:16px;cursor:pointer;transition:color .15s;padding:4px}
.ctrl-btn:hover{color:#cec9c1}
.play-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-size:22px;cursor:pointer;color:#f5f1ea;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
.play-btn:hover{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.08)}
.dl-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:10px 24px;background:rgba(76,175,130,.08);border:1px solid rgba(76,175,130,.4);color:#4caf82;border-radius:4px;cursor:pointer;letter-spacing:.08em;display:flex;align-items:center;gap:10px;transition:all .2s}
.dl-btn:hover{background:rgba(76,175,130,.15);border-color:#4caf82}
.dl-btn.loading{opacity:.5;cursor:default;pointer-events:none}
.dl-btn.done{border-color:rgba(76,175,130,.25);color:rgba(76,175,130,.5);background:transparent}
.pitch-wrap{width:100%;max-width:480px}
.pitch-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.5);text-align:center;margin-bottom:12px}
.pitch-row{display:flex;align-items:center;gap:16px}
.pitch-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#c9a84c;width:40px;text-align:center}
.pitch-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;border-radius:2px}
.pitch-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer;box-shadow:0 0 8px rgba(201,168,76,.5)}
.pitch-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer;border:none}
.pitch-reset{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;background:transparent;border:1px solid rgba(255,255,255,.1);color:#444;border-radius:2px;cursor:pointer;transition:all .15s}
.pitch-reset:hover{border-color:#c9a84c;color:#c9a84c}
.pitch-note{font-family:'Space Mono',monospace;font-size:9px;color:#333;text-align:center;margin-top:8px}
.loading-ring{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;font-size:11px;color:#555;text-align:center;margin-top:10px;letter-spacing:.06em}
.err-icon{font-size:36px;opacity:.2;text-align:center}
.err-text{font-family:'Space Mono',monospace;font-size:12px;color:#e05a4a;text-align:center}
.empty-hint{font-family:'Space Mono',monospace;font-size:11px;color:#333;text-align:center;letter-spacing:.08em}
.state{flex:1;position:relative;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px}
.state-icon{font-size:36px;opacity:.3}
.state-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#555}
.state-sub{font-size:13px;color:#333;text-align:center}
@media(max-width:640px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:120px;max-height:120px;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .sb-label{display:none}
  .song-item{flex-direction:column;min-width:80px;padding:8px 10px;gap:4px;border-bottom:none;border-right:1px solid rgba(255,255,255,.04)}
  .song-title-text{font-size:11px}
  .song-num{display:none}
  .player-area{padding:20px 16px;gap:18px}
  .now-title{font-size:18px}
  .dl-btn{padding:8px 16px;font-size:10px}
}
</style>
</head>
<body>
<canvas id="space"></canvas>
<nav>
  <span class="logo">LISTEN</span>
  <span class="nav-sep">·</span>
  <span class="nav-title" id="nav-title">Loading...</span>
  <span class="nav-exp" id="nav-exp"></span>
</nav>
<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="sb-label">DEMOS</div>
    <div id="song-list"></div>
  </div>
  <div class="player-area" id="player">
    <div class="empty-hint">← SELECT A DEMO</div>
  </div>
</div>
<div class="state" id="state"></div>

<script>
// ── Starfield ────────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('space')
  const ctx = c.getContext('2d')
  let W, H, DPR, stars = []
  const N = 260, SPEED = 0.5

  function resize() {
    DPR = window.devicePixelRatio || 1
    W = window.innerWidth; H = window.innerHeight
    c.style.width = W + 'px'; c.style.height = H + 'px'
    c.width = Math.floor(W * DPR)
    c.height = Math.floor(H * DPR)
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0)
  }
  function makeStar() {
    return { x:(Math.random()-0.5)*2, y:(Math.random()-0.5)*2, z:Math.random(), pz:0 }
  }
  function init() { resize(); stars = Array.from({length:N}, makeStar) }
  function draw() {
    ctx.fillStyle = 'rgba(0,0,0,0.16)'
    ctx.fillRect(0, 0, W, H)
    const cx = W/2, cy = H/2
    stars.forEach(s => {
      s.pz = s.z; s.z -= SPEED * 0.01
      if (s.z <= 0) { Object.assign(s, makeStar()); s.z = 1; s.pz = 1 }
      const sx = (s.x/s.z)*W + cx, sy = (s.y/s.z)*H + cy
      const px = (s.x/s.pz)*W + cx, py = (s.y/s.pz)*H + cy
      if (sx<-20||sx>W+20||sy<-20||sy>H+20) { Object.assign(s, makeStar()); return }
      const t = 1 - s.z
      const size = Math.max(0.4, t * 2.2)
      const alpha = 0.3 + t * 0.7
      const bright = Math.floor(180 + t * 75)
      ctx.beginPath()
      ctx.moveTo(px, py)
      ctx.lineTo(sx, sy)
      ctx.strokeStyle = `rgba(${bright},${bright},${Math.min(255,bright+30)},${alpha})`
      ctx.lineWidth = size
      ctx.stroke()
    })
    requestAnimationFrame(draw)
  }
  window.addEventListener('resize', resize)
  init(); draw()
})()

// ── Audio ────────────────────────────────────────────────────────────────────
const SB_URL = 'https://ukqpnjgvjeduipmdaczn.supabase.co'
const SB_KEY = 'sb_publishable_4yMwlAo6OLpgGPN_6yWvIw_g5bnjnWS'
const { createClient } = window.supabase
const db = createClient(SB_URL, SB_KEY)

let songs = [], sessionId = null, currentIdx = -1
let isPlaying = false, progressTimer = null, currentPitch = 0
let tonePlayer = null, pitchNode = null
let downloads = {}

function toDirectUrl(u) {
  if (!u) return null
  if (u.includes('dl.dropboxusercontent.com')) return u
  return u.replace('www.dropbox.com','dl.dropboxusercontent.com')
    .replace(/dl=0/,'dl=1') + (u.includes('dl=') ? '' : (u.includes('?') ? '&dl=1' : '?dl=1'))
}
function toFetchUrl(u) {
  if (!u) return null
  return '/api/audio?url=' + encodeURIComponent(toDirectUrl(u))
}

async function init() {
  const id = new URLSearchParams(location.search).get('s')
  if (!id) { showState('🔒','NO LINK','Open your personal listen link.'); return }
  sessionId = id
  const { data } = await db.from('share_sessions').select('*').eq('id', id).maybeSingle()
  if (!data) { showState('🔍','NOT FOUND','This link is invalid or expired.'); return }
  if (data.expires_at && new Date(data.expires_at) < new Date()) { showState('⏱','EXPIRED','Contact the producer for a new link.'); return }
  songs = data.songs || []
  downloads = data.downloads || {}
  document.getElementById('nav-title').textContent = data.patch_name || 'Demo Session'
  document.title = 'LISTEN — ' + (data.patch_name || 'Demo')
  const exp = data.expires_at ? Math.ceil((new Date(data.expires_at)-Date.now())/86400000) : null
  if (exp) document.getElementById('nav-exp').textContent = exp + 'd left'
  buildList()
  document.getElementById('app').style.display = 'flex'
}

function buildList() {
  document.getElementById('song-list').innerHTML = songs.map((s,i) => `
    <div class="song-item" id="si${i}" onclick="playSong(${i})">
      <span class="song-num">${String(i+1).padStart(2,'0')}</span>
      <div class="song-title-text">${esc(s.title||s.code)}</div>
      <span class="song-dl-dot ${downloads[s.code]?'visible':''}" title="Downloaded">↓</span>
      <div class="song-dot" id="sd${i}"></div>
    </div>`).join('')
}

function setActive(idx) {
  document.querySelectorAll('.song-item').forEach(el=>el.classList.remove('active'))
  document.querySelectorAll('.song-dot').forEach(el=>el.classList.remove('on'))
  if(idx>=0){ document.getElementById('si'+idx)?.classList.add('active'); document.getElementById('sd'+idx)?.classList.add('on') }
}

// ── Pitch-correct playback: fetch → decode → AudioBufferSource → PitchShift ──
async function ensureCtx() {
  if (audioCtx) return
  await Tone.start()
  // Use Tone's context — so raw Web Audio nodes can connect to Tone nodes
  audioCtx = Tone.getContext().rawContext
  if (audioCtx.state === 'suspended') await audioCtx.resume()
}

async function playSong(idx) {
  if (idx === currentIdx && tonePlayer) { togglePlay(); return }
  stopAll()
  currentIdx = idx
  setActive(idx)
  const song = songs[idx]
  showLoading(song)

  try {
    await Tone.start()
    showLoadingText('Loading...')
    const resp = await fetch(toFetchUrl(song.shareUrl))
    if (!resp.ok) throw new Error('HTTP ' + resp.status)
    const buf = await resp.arrayBuffer()
    // Use blob URL so Tone.Player loads it same-origin (no CORS, no context mismatch)
    const blobUrl = URL.createObjectURL(new Blob([buf], {type: 'audio/mpeg'}))
    showLoadingText('Decoding...')
    pitchNode = new Tone.PitchShift(currentPitch).toDestination()
    tonePlayer = new Tone.Player(blobUrl).connect(pitchNode)
    await Tone.loaded()
    URL.revokeObjectURL(blobUrl)
    showPlayer(song)
    tonePlayer.start()
    isPlaying = true
    startProgress()
    tonePlayer.onstop = () => {
      isPlaying = false; stopProgress(); updateBtn()
      if (currentIdx < songs.length - 1) playSong(currentIdx + 1)
    }
  } catch(e) {
    console.error('playSong error:', e)
    showErr('Could not load — try again or generate a new link')
  }
}

function startPlayback() {
  if (!tonePlayer) return
  tonePlayer.start()
  isPlaying = true; startProgress(); updateBtn()
}

function stopAll() {
  stopProgress()
  if (tonePlayer) { try { tonePlayer.stop(); tonePlayer.dispose() } catch(e){} tonePlayer = null }
  if (pitchNode) { try { pitchNode.dispose() } catch(e){} pitchNode = null }
  isPlaying = false
}

function togglePlay() {
  if (!tonePlayer) return
  if (isPlaying) {
    tonePlayer.stop(); isPlaying = false; stopProgress(); updateBtn()
  } else {
    tonePlayer.start(); isPlaying = true; startProgress(); updateBtn()
  }
}

function setPitch(v) {
  currentPitch = parseInt(v)
  const el = document.getElementById('pv'); if (el) el.textContent = currentPitch>0?'+'+currentPitch:currentPitch
  if (pitchNode) pitchNode.pitch = currentPitch
}
function resetPitch() { currentPitch=0; const s=document.getElementById('ps'); if(s)s.value=0; setPitch(0) }

// ── Download ─────────────────────────────────────────────────────────────────
async function downloadSong(idx) {
  const song = songs[idx]
  const url = toDirectUrl(song.shareUrl)
  const btn = document.getElementById(`dlb${idx}`)
  if (!btn || btn.classList.contains('loading')) return
  btn.classList.add('loading'); btn.innerHTML = '<span>↓</span> Downloading...'
  try {
    const resp = await fetch(url)
    const blob = await resp.blob()
    const ext = url.match(/\.(mp3|wav|m4a|flac|aiff|ogg)/i)?.[1] || 'mp3'
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = (song.title || song.code) + '.' + ext
    a.click()
    URL.revokeObjectURL(a.href)
    btn.classList.remove('loading'); btn.classList.add('done'); btn.innerHTML = '✓ Downloaded'
    // Mark in sidebar
    document.querySelector(`#si${idx} .song-dl-dot`)?.classList.add('visible')
    // Save to DB
    downloads[song.code] = new Date().toISOString()
    await db.from('share_sessions').update({ downloads }).eq('id', sessionId)
  } catch(e) {
    btn.classList.remove('loading'); btn.innerHTML = '<span>↓</span> Download'
    alert('Download failed — try again')
  }
}

// ── Progress ─────────────────────────────────────────────────────────────────
function startProgress() { stopProgress(); progressTimer = setInterval(tick, 150) }
function stopProgress() { if(progressTimer){clearInterval(progressTimer);progressTimer=null} }
function tick() {
  if (!tonePlayer) return
  const cur = tonePlayer.immediate ? Tone.now() : (tonePlayer.currentTime || 0)
  const dur = tonePlayer.buffer?.duration || 0
  if (!dur) return
  const pct = Math.min(cur / dur, 1) * 100
  const f = document.getElementById('pf'); if(f) f.style.width = pct + '%'
  const t = document.getElementById('tc'); if(t) t.textContent = fmt(cur)
}
function updateBtn() { const b=document.getElementById('pb'); if(b) b.textContent=isPlaying?'⏸':'▶' }

function seek(e, el) {
  if (!tonePlayer?.buffer) return
  const pct = (e.clientX - el.getBoundingClientRect().left) / el.offsetWidth
  const offset = pct * tonePlayer.buffer.duration
  tonePlayer.stop()
  tonePlayer.start('+0', offset)
  isPlaying = true; updateBtn(); startProgress()
}

// ── Render ────────────────────────────────────────────────────────────────────
function pitchHtml() {
  return `<div class="pitch-wrap">
    <div class="pitch-label">KEY — pitch shift</div>
    <div class="pitch-row">
      <button class="pitch-reset" onclick="resetPitch()">Reset</button>
      <input class="pitch-slider" id="ps" type="range" min="-12" max="12" step="1"
        value="${currentPitch}" oninput="setPitch(this.value)">
      <div class="pitch-val" id="pv">${currentPitch>0?'+'+currentPitch:currentPitch}</div>
    </div>
    <div class="pitch-note">semitones · tempo unchanged</div>
  </div>`
}

function showLoading(song) {
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div><div class="loading-ring"></div><div class="loading-text" id="ltxt">Loading...</div></div>
    ${pitchHtml()}`
}
function showLoadingText(t) { const e=document.getElementById('ltxt'); if(e) e.textContent=t }

function showPlayer(song) {
  const dur = fmt(tonePlayer?.buffer?.duration || 0)
  const dlDone = downloads[song.code] ? 'done' : ''
  const dlLabel = downloads[song.code] ? '✓ Downloaded' : '↓&nbsp;&nbsp;Download'
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div style="width:100%;max-width:480px">
      <div class="progress-outer" onclick="seek(event,this)">
        <div class="progress-fill" id="pf" style="width:0%"></div>
      </div>
      <div class="times"><span id="tc">0:00</span><span>${dur}</span></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="if(currentIdx>0)playSong(currentIdx-1)">◀◀</button>
      <button class="play-btn" id="pb" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="if(currentIdx<songs.length-1)playSong(currentIdx+1)">▶▶</button>
    </div>
    <button class="dl-btn ${dlDone}" id="dlb${currentIdx}" onclick="downloadSong(${currentIdx})">
      <span style="font-size:16px">↓</span> ${dlLabel}
    </button>
    ${pitchHtml()}`
}
function showErr(msg) {
  document.getElementById('player').innerHTML = `<div class="err-icon">⚠</div><div class="err-text">${msg}</div>${pitchHtml()}`
}
function showState(icon,title,msg) {
  document.getElementById('app').style.display='none'
  const s=document.getElementById('state'); s.style.display='flex'
  s.innerHTML=`<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-sub">${msg}</div>`
  document.getElementById('nav-title').textContent=title
}
function fmt(s){const t=Math.max(0,Math.floor(s||0));return Math.floor(t/60)+':'+(t%60+'').padStart(2,'0')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

init()
</script>
</body>
</html>
