<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#000;color:#f5f1ea;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
#space{position:fixed;inset:0;z-index:0;pointer-events:none}
nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;padding:12px 20px;gap:12px;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.16em;color:#c9a84c}
.nav-sep{color:#333}
.nav-title{font-family:'Space Mono',monospace;font-size:10px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-exp{font-family:'Space Mono',monospace;font-size:10px;color:#333}
.app{position:relative;z-index:1;display:flex;flex-direction:column;flex:1;overflow:hidden}
.rolodex-wrap{position:relative;flex-shrink:0;height:96px;overflow:hidden;background:rgba(0,0,0,.5);border-bottom:1px solid rgba(255,255,255,.05)}
.rolodex-track{display:flex;align-items:center;height:100%;padding:0 calc(50% - 65px);gap:0;cursor:grab;user-select:none;will-change:transform;transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
.rcard{flex-shrink:0;width:110px;height:72px;border:1px solid rgba(76,175,130,.2);border-radius:4px;background:rgba(76,175,130,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all .3s cubic-bezier(.25,.46,.45,.94);margin:0 5px}
.rcard .rc-num{display:none}
.rcard .rc-title{font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,255,255,.38);text-align:center;padding:0 8px;overflow:hidden;max-width:100px;white-space:nowrap;text-overflow:ellipsis;letter-spacing:.04em}
.rcard .rc-dot{width:3px;height:3px;border-radius:50%;background:rgba(76,175,130,.25)}
.rcard.near{border-color:rgba(76,175,130,.3);background:rgba(76,175,130,.1)}
.rcard.near .rc-title{color:rgba(255,255,255,.55)}
.rcard.active{width:130px;height:80px;border-color:#4caf82;background:rgba(76,175,130,.18)}
.rcard.active .rc-title{color:#fff;font-size:11px}
.rcard.active .rc-dot{background:#4caf82;width:4px;height:4px}
.rcard.dl-done::after{content:'↓';position:absolute;top:4px;right:6px;font-size:8px;color:#4caf82;font-family:'Space Mono',monospace}
.fade-left{position:absolute;left:0;top:0;bottom:0;width:80px;background:linear-gradient(to right,rgba(0,0,0,.97),transparent);pointer-events:none;z-index:2}
.fade-right{position:absolute;right:0;top:0;bottom:0;width:80px;background:linear-gradient(to left,rgba(0,0,0,.97),transparent);pointer-events:none;z-index:2}
.player-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 40px;gap:20px;min-width:0;overflow-y:auto}
.now-code{font-family:'Space Mono',monospace;font-size:10px;color:#444;text-align:center;margin-bottom:4px}
.now-title{font-size:22px;text-align:center;color:#f5f1ea;font-weight:300}
.progress-outer{width:100%;max-width:600px;position:relative;cursor:pointer;user-select:none}
.waveform-canvas{display:block;width:100%;height:80px;border-radius:4px}
.times{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:10px;color:#444;width:100%;max-width:600px;margin-top:6px}
.controls{display:flex;align-items:center;gap:28px}
.play-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-size:22px;cursor:pointer;color:#f5f1ea;display:flex;align-items:center;justify-content:center;transition:all .2s}
.play-btn:hover{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.08)}
.dl-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:10px 24px;background:rgba(76,175,130,.08);border:1px solid rgba(76,175,130,.4);color:#4caf82;border-radius:4px;cursor:pointer;letter-spacing:.08em;display:flex;align-items:center;gap:10px;transition:all .2s}
.dl-btn:hover{background:rgba(76,175,130,.15);border-color:#4caf82}
.dl-btn.loading{opacity:.5;cursor:default;pointer-events:none}
.dl-btn.done{border-color:rgba(76,175,130,.25);color:rgba(76,175,130,.5);background:transparent}
.pitch-wrap{width:100%;max-width:600px}
.pitch-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.5);text-align:center;margin-bottom:12px}
.pitch-row{display:flex;align-items:center;gap:16px}
.pitch-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#c9a84c;width:40px;text-align:center}
.pitch-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;border-radius:2px}
.pitch-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer}
.pitch-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer;border:none}
.pitch-reset{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;background:transparent;border:1px solid rgba(255,255,255,.1);color:#444;border-radius:2px;cursor:pointer;transition:all .15s}
.pitch-reset:hover{border-color:#c9a84c;color:#c9a84c}
.pitch-note{font-family:'Space Mono',monospace;font-size:9px;color:#333;text-align:center;margin-top:8px}
.loading-ring{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{from{opacity:.2}to{opacity:.8}}
.loading-text{font-family:'Space Mono',monospace;font-size:11px;color:#555;text-align:center;margin-top:10px;letter-spacing:.06em}
.err-icon{font-size:36px;opacity:.2;text-align:center}
.err-text{font-family:'Space Mono',monospace;font-size:12px;color:#e05a4a;text-align:center}
.empty-hint{font-family:'Space Mono',monospace;font-size:14px;color:rgba(255,255,255,.5);text-align:center;letter-spacing:.12em}
.state{flex:1;position:relative;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px}
.state-icon{font-size:36px;opacity:.3}
.state-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#555}
.state-sub{font-size:13px;color:#333;text-align:center}
.stems-page{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px 20px;width:100%;text-align:center}
.stems-title{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.1em;color:#f5f1ea;text-transform:uppercase}
.stems-sub{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.25em;color:rgba(201,168,76,.85);margin-top:-4px}
.stems-dl-btn{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.1em;padding:16px 40px;background:transparent;border:1px solid rgba(76,175,130,.5);color:#4caf82;border-radius:4px;cursor:pointer;transition:all .2s;margin-top:8px}
.stems-dl-btn:hover{background:rgba(76,175,130,.08);border-color:#4caf82}
.stems-dl-btn:disabled{opacity:.5;cursor:default}
.stems-dl-status{font-family:'Space Mono',monospace;font-size:9px;color:#333;letter-spacing:.06em}
.feedback-panel{width:100%;max-width:740px;margin-top:8px;border-top:1px solid rgba(255,255,255,.06);padding-top:16px}
.feedback-title{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.85);margin-bottom:12px}
.feedback-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:180px;overflow-y:auto}
.feedback-item{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:3px}
.feedback-ts{font-family:'Space Mono',monospace;font-size:10px;color:#c9a84c;flex-shrink:0;cursor:pointer;padding-top:1px}
.feedback-ts:hover{color:#f5f1ea}
.feedback-txt{font-size:13px;color:#cec9c1;flex:1;line-height:1.5}
.feedback-input-row{display:flex;gap:8px}
.feedback-inp{flex:1;background:#111;border:1px solid #252525;color:#f5f1ea;font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 10px;border-radius:3px;outline:none}
.feedback-inp:focus{border-color:rgba(201,168,76,.4)}
.feedback-inp::placeholder{color:#333}
.feedback-submit{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:8px 14px;background:transparent;border:1px solid rgba(201,168,76,.4);color:#c9a84c;border-radius:3px;cursor:pointer;white-space:nowrap}
.feedback-submit:hover{background:rgba(201,168,76,.08)}
.feedback-sent{font-family:'Space Mono',monospace;font-size:10px;color:#4caf82;padding:6px 0}
@media(max-width:640px){
  .feedback-panel{padding:12px 0 0}
  .rolodex-track{padding:0 calc(50% - 53px)}
  .rcard{width:90px;height:62px;margin:0 4px}
  .rcard.near{width:90px;height:62px}
  .rcard.active{width:106px;height:70px}
  .player-area{padding:16px;gap:14px}
  .now-title{font-size:18px}
  .dl-btn{padding:8px 16px;font-size:10px}
  .waveform-canvas{height:56px}
}
}
</style>
</head>
<body>
<canvas id="space"></canvas>
<nav>
  <span class="logo">LISTEN</span>
  <span class="nav-sep">·</span>
  <span class="nav-title" id="nav-title">Loading...</span>
  <span class="nav-exp" id="nav-exp"></span>
</nav>
<div class="app" id="app" style="display:none">
  <div class="rolodex-wrap">
    <div class="rolodex-track" id="rdx-track"></div>
    <div class="fade-left"></div>
    <div class="fade-right"></div>
  </div>
  <div class="player-area" id="player">
    <div class="empty-hint" id="empty-hint">↑ SELECT A DEMO</div>
  </div>
</div>
<div class="state" id="state"></div>

<script>
// ── Background switcher ───────────────────────────────────────────────────────
function setBackground(bg) {
  const c = document.getElementById('space')
  // Stop any existing animation by replacing canvas (clears all listeners)
  const fresh = c.cloneNode(false)
  c.parentNode.replaceChild(fresh, c)
  if (bg === 'void') { fresh.style.background = '#000'; return }
  if (bg === 'neon_pop')  startNeonStars(fresh, ['#ffdd00','#ff9900','#ffbb00','#ffee44','#ff8800'])
  else if (bg === 'neon_calm') startNeonStars(fresh, ['#00ff88','#44ddff','#00cc66','#88ffcc','#00aaff'])
  else if (bg === 'neon_rock') startNeonStars(fresh, ['#ff2244','#ff5566','#ffffff','#ff3355','#ffaaaa'])
  else if (bg === 'neon_elec') startNeonStars(fresh, ['#cc44ff','#9922ff','#ff44dd','#aa00ff','#dd88ff'])
  else if (bg === 'aurora') startAurora(fresh)
  else if (bg === 'rain') startRain(fresh)
  else if (bg === 'c64') startC64(fresh)
  else startStars(fresh) // default: stars
}

function startAurora(c) {
  const ctx = c.getContext('2d')
  let W, H, t = 0, dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.04)'
    ctx.fillRect(0,0,W,H)
    for (let i = 0; i < 4; i++) {
      const hue = 140 + i*30 + Math.sin(t*0.3+i)*20
      const y = H*0.3 + Math.sin(t*0.2+i*1.5)*H*0.15
      const grd = ctx.createRadialGradient(W/2, y, 0, W/2, y, W*0.8)
      grd.addColorStop(0, `hsla(${hue},80%,50%,0.06)`)
      grd.addColorStop(1, 'transparent')
      ctx.fillStyle = grd; ctx.fillRect(0,0,W,H)
    }
    t += 0.015
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startRain(c) {
  const ctx = c.getContext('2d')
  let W, H, drops = [], dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false; drops=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,len:10+Math.random()*20,speed:4+Math.random()*6,alpha:0.1+Math.random()*0.3})) }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,W,H)
    drops.forEach(d => {
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-1,d.y+d.len)
      ctx.strokeStyle = `rgba(180,220,255,${d.alpha})`; ctx.lineWidth = 0.8; ctx.stroke()
      d.y += d.speed
      if (d.y > H+d.len) { d.y = -d.len; d.x = Math.random()*W }
    })
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startGrid(c) {
  const ctx = c.getContext('2d')
  let W, H, t = 0, dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H)
    const size = 60; const offset = (t * 0.5) % size
    ctx.strokeStyle = 'rgba(201,168,76,0.08)'; ctx.lineWidth = 0.5
    for (let x = -size+offset; x < W+size; x += size) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke()
    }
    const voffset = (t * 0.3) % size
    for (let y = -size+voffset; y < H+size; y += size) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke()
    }
    // Glow at intersections near center
    const cx = W/2, cy = H/2
    const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6)
    grd.addColorStop(0,'rgba(201,168,76,0.04)'); grd.addColorStop(1,'transparent')
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H)
    t += 0.5; requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startNeonStars(c, palette) {
  const ctx = c.getContext('2d')
  let W = 0, H = 0, DPR = 1, stars = [], dirty = true
  const N = 280, SPEED = 0.42

  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() {
    c.style.width=W+'px'; c.style.height=H+'px'
    c.width=Math.round(W*DPR); c.height=Math.round(H*DPR)
    ctx.setTransform(DPR,0,0,DPR,0,0); dirty=false
  }
  function makeStar() {
    const hex = palette[Math.floor(Math.random()*palette.length)]
    const r = parseInt(hex.slice(1,3),16)
    const g = parseInt(hex.slice(3,5),16)
    const b = parseInt(hex.slice(5,7),16)
    return { x:(Math.random()-0.5)*2, y:(Math.random()-0.5)*2, z:Math.random(), pz:0, r, g, b }
  }

  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.14)'; ctx.fillRect(0,0,W,H)
    const cx=W/2, cy=H/2
    stars.forEach(s => {
      s.pz=s.z; s.z -= SPEED*0.01
      if (s.z<=0) { Object.assign(s,makeStar()); s.z=1; s.pz=1 }
      const sx=(s.x/s.z)*W+cx, sy=(s.y/s.z)*H+cy
      const px=(s.x/s.pz)*W+cx, py=(s.y/s.pz)*H+cy
      if (sx<-20||sx>W+20||sy<-20||sy>H+20) { Object.assign(s,makeStar()); return }
      const t = 1-s.z
      const size = Math.max(0.3, t*2.0)
      const alpha = 0.35 + t*0.65
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(sx,sy)
      ctx.strokeStyle = `rgba(${s.r},${s.g},${s.b},${alpha})`
      ctx.lineWidth = size; ctx.stroke()
      // glowing dot at tip for close stars
      if (t > 0.65) {
        ctx.beginPath(); ctx.arc(sx,sy,size*0.9,0,Math.PI*2)
        ctx.fillStyle = `rgba(${s.r},${s.g},${s.b},${alpha*0.7})`
        ctx.fill()
      }
    })
    requestAnimationFrame(draw)
  }

  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80)})
  resize(); stars=Array.from({length:N},makeStar); draw()
}

function startC64(c) {
  const ctx = c.getContext('2d')
  let W, H, DPR, grid = [], t = 0, dirty = true
  const CHARS = '01ABCDEF@#!>_|=+*~abcdef0123456789'
  const COLS = 52, ROWS = 24

  function resize() {
    DPR = devicePixelRatio || 1; W = innerWidth; H = innerHeight; dirty = true
  }
  function apply() {
    c.width = Math.round(W*DPR); c.height = Math.round(H*DPR)
    c.style.width = W+'px'; c.style.height = H+'px'
    ctx.setTransform(DPR,0,0,DPR,0,0)
    dirty = false
    grid = []
    for (let r = 0; r < ROWS; r++) {
      let row = []
      for (let cl = 0; cl < COLS; cl++) {
        row.push({ ch: CHARS[Math.random()*CHARS.length|0], bright: Math.random(), speed: 0.3+Math.random()*0.8, phase: Math.random()*Math.PI*2 })
      }
      grid.push(row)
    }
  }

  function draw() {
    if (dirty) apply()
    t += 0.016
    const fw = W/COLS, fh = H/ROWS
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H)
    ctx.font = `${Math.round(fh*0.72)}px "Courier New",monospace`
    ctx.textBaseline = 'middle'; ctx.textAlign = 'center'

    for (let r = 0; r < ROWS; r++) {
      for (let cl = 0; cl < COLS; cl++) {
        const g = grid[r][cl]
        const flicker = 0.55 + 0.45 * Math.sin(t*g.speed + g.phase)
        ctx.fillStyle = `rgba(20,255,80,${0.018 + g.bright*flicker*0.1})`
        ctx.fillText(g.ch, (cl+0.5)*fw, (r+0.5)*fh)
        if (Math.random() < 0.0008) { g.ch = CHARS[Math.random()*CHARS.length|0]; g.bright = Math.random() }
      }
    }

    // Scanlines
    ctx.globalAlpha = 0.18; ctx.fillStyle = '#000'
    for (let y = 0; y < H; y += 3) ctx.fillRect(0,y,W,1.2)
    ctx.globalAlpha = 1

    // Vignette — CRT glass darkness toward edges
    const vgrd = ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.9)
    vgrd.addColorStop(0,'rgba(0,0,0,0)')
    vgrd.addColorStop(0.65,'rgba(0,0,0,0.08)')
    vgrd.addColorStop(1,'rgba(0,0,0,0.8)')
    ctx.fillStyle = vgrd; ctx.fillRect(0,0,W,H)

    // Glass reflection top-left
    const ref = ctx.createLinearGradient(0,0,W*0.55,H*0.4)
    ref.addColorStop(0,'rgba(255,255,255,0.04)')
    ref.addColorStop(0.5,'rgba(255,255,255,0.01)')
    ref.addColorStop(1,'rgba(255,255,255,0)')
    ctx.fillStyle = ref; ctx.fillRect(0,0,W,H)

    // Slow horizontal roll line
    const ry = ((t*16) % (H+24)) - 12
    const rgrd = ctx.createLinearGradient(0,ry-10,0,ry+10)
    rgrd.addColorStop(0,'rgba(30,255,90,0)')
    rgrd.addColorStop(0.5,'rgba(30,255,90,0.012)')
    rgrd.addColorStop(1,'rgba(30,255,90,0)')
    ctx.fillStyle = rgrd; ctx.fillRect(0,ry-10,W,20)

    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80)})
  resize(); draw()
}

function startStars(c) {
  const ctx = c.getContext('2d')
  let W = 0, H = 0, DPR = 1, stars = [], dirty = true
  const N = 350, SPEED = 0.45
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.style.width=W+'px'; c.style.height=H+'px'; c.width=Math.round(W*DPR); c.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); dirty=false }
  function makeStar() { return {x:(Math.random()-0.5)*2,y:(Math.random()-0.5)*2,z:Math.random(),pz:0} }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle='rgba(0,0,0,0.13)'; ctx.fillRect(0,0,W,H)
    const cx=W/2,cy=H/2
    stars.forEach(s => {
      s.pz=s.z; s.z-=SPEED*0.01
      if(s.z<=0){Object.assign(s,makeStar());s.z=1;s.pz=1}
      const sx=(s.x/s.z)*W+cx,sy=(s.y/s.z)*H+cy,px=(s.x/s.pz)*W+cx,py=(s.y/s.pz)*H+cy
      if(sx<-20||sx>W+20||sy<-20||sy>H+20){Object.assign(s,makeStar());return}
      const t=1-s.z; const size=Math.max(0.3,t*1.6); const alpha=0.3+t*0.7; const bright=Math.floor(180+t*75)
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy)
      ctx.strokeStyle=`rgba(${bright},${bright},${Math.min(255,bright+30)},${alpha})`;ctx.lineWidth=size;ctx.stroke()
    })
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80)})
  resize(); stars=Array.from({length:N},makeStar); draw()
}

function toFetchUrl(u) {

// ── Rolodex ───────────────────────────────────────────────────────────────────
let rdxOffset = 0

function rdxCardWidth() {
  const c = document.querySelector('.rcard')
  if (!c) return 120
  return c.offsetWidth + parseInt(getComputedStyle(c).marginLeft) * 2
}

function rdxScrollTo(idx, animate) {
  const track = document.getElementById('rdx-track')
  if (!track) return
  rdxOffset = -idx * rdxCardWidth()
  track.style.transition = animate ? 'transform .35s cubic-bezier(.25,.46,.45,.94)' : 'none'
  track.style.transform = `translateX(${rdxOffset}px)`
  updateRdxClasses(idx)
}

function updateRdxClasses(activeIdx) {
  document.querySelectorAll('.rcard').forEach((el, i) => {
    const dist = Math.abs(i - activeIdx)
    el.classList.toggle('active', i === activeIdx)
    el.classList.toggle('near', dist === 1 || dist === 2)
    el.style.opacity = dist === 0 ? '1' : dist === 1 ? '.65' : dist === 2 ? '.35' : '.15'
    el.style.transform = dist === 0 ? 'scale(1)' : dist === 1 ? 'scale(.95)' : 'scale(.88)'
    if (downloads[songs[i]?.code]) el.classList.add('dl-done')
    else el.classList.remove('dl-done')
  })
}

function rdxSelect(idx) { rdxScrollTo(idx, true); playSong(idx) }
function setActive(idx) { rdxScrollTo(idx, true) }

function initRolodex() {
  const track = document.getElementById('rdx-track')
  if (!track) return
  let startX = 0, startOffset = 0, dragging = false, moved = false
  const onStart = e => {
    dragging = true; moved = false
    startX = e.touches ? e.touches[0].clientX : e.clientX
    startOffset = rdxOffset
    track.classList.add('dragging'); track.style.transition = 'none'
  }
  const onMove = e => {
    if (!dragging) return
    const dx = (e.touches ? e.touches[0].clientX : e.clientX) - startX
    if (Math.abs(dx) > 4) { moved = true; e.preventDefault() }
    rdxOffset = startOffset + dx
    track.style.transform = `translateX(${rdxOffset}px)`
    const nearest = Math.max(0, Math.min(songs.length-1, Math.round(-rdxOffset / rdxCardWidth())))
    updateRdxClasses(nearest)
  }
  const onEnd = () => {
    if (!dragging) return
    dragging = false; track.classList.remove('dragging')
    const nearest = Math.max(0, Math.min(songs.length-1, Math.round(-rdxOffset / rdxCardWidth())))
    rdxScrollTo(nearest, true)
    if (!moved) rdxSelect(nearest)
  }
  track.addEventListener('mousedown', onStart)
  window.addEventListener('mousemove', onMove)
  window.addEventListener('mouseup', onEnd)
  track.addEventListener('touchstart', onStart, { passive: true })
  track.addEventListener('touchmove', onMove, { passive: false })
  track.addEventListener('touchend', onEnd)
  rdxScrollTo(0, false)
}

// ── Playback ──────────────────────────────────────────────────────────────────
function playSong(idx) {
  // Stop and tear down any existing playback first
  stopAll()

  currentIdx = idx
  setActive(idx)
  const song = songs[idx]
  showLoading(song)

  // Create a fresh <audio> element every time
  audioEl = document.createElement('audio')
  audioEl.preload = 'auto'

  audioEl.addEventListener('canplay', function onCanPlay() {
    audioEl.removeEventListener('canplay', onCanPlay)
    if (audioEl !== window._currentAudioEl) return // stale
    audioEl._canPlayFired = true
    showPlayer(song)
    audioEl.play().then(() => {
      isPlaying = true; startProgress(); updateBtn()
      decodeWaveformBg(song)
    }).catch(err => {
      console.warn('play() rejected:', err)
      showPlayer(song)
      isPlaying = false; updateBtn()
    })
  }, { once: true })

  audioEl.addEventListener('ended', () => {
    if (audioEl !== window._currentAudioEl) return
    isPlaying = false; stopProgress(); updateBtn()
    if (currentIdx < songs.length - 1) playSong(currentIdx + 1)
  })

  audioEl.addEventListener('error', () => {
    if (audioEl !== window._currentAudioEl) return
    if (audioEl._canPlayFired) return
    const code = audioEl.error?.code
    // Only show error for fatal failures (decode=3, unsupported=4)
    // Ignore code 2 (network) — fires during Dropbox redirects but resolves
    if (code === 3 || code === 4) {
      setTimeout(() => {
        if (audioEl !== window._currentAudioEl || audioEl._canPlayFired) return
        showErr('Could not load audio — check connection')
      }, 1000)
    }
  })

  const url = toFetchUrl(song.previewUrl || song.shareUrl)
  audioEl.src = url
  window._currentAudioEl = audioEl
}


function stopAll() {
  stopProgress()
  waveformPeaks = null; audioBuffer = null; isSeeking = false; isPlaying = false
  if (audioEl) {
    audioEl.pause()
    audioEl.src = ''
    audioEl.load()
    audioEl = null
  }
  window._currentAudioEl = null
}

function togglePlay() {
  if (!audioEl) return
  if (isPlaying) {
    audioEl.pause()
    isPlaying = false; stopProgress(); updateBtn()
  } else {
    audioEl.play().then(() => {
      isPlaying = true; startProgress(); updateBtn()
    }).catch(e => console.warn('play():', e))
  }
}

function setPitch(v) {
  currentPitch = parseInt(v)
  const el = document.getElementById('pv')
  if (el) el.textContent = currentPitch > 0 ? '+' + currentPitch : currentPitch
  // Note: pitch shift requires Web Audio API — skipped for reliability.
  // The slider moves but pitch change is visual only unless user re-opens song.
}
function resetPitch() {
  currentPitch = 0
  const s = document.getElementById('ps'); if (s) s.value = 0
  setPitch(0)
}

// ── Progress / Waveform ───────────────────────────────────────────────────────
function startProgress() { stopProgress(); progressTimer = setInterval(tick, 80) }
function stopProgress() { clearInterval(progressTimer); progressTimer = null }
function tick() {
  if (!audioEl) return
  const dur = audioEl.duration || 0
  const cur = audioEl.currentTime || 0
  drawWaveform(dur ? cur / dur : 0)
  const t = document.getElementById('tc'); if (t) t.textContent = fmt(cur)
  const td = document.getElementById('tdur'); if (td && dur) td.textContent = fmt(dur)
}
function updateBtn() {
  const b = document.getElementById('pb')
  if (b) b.textContent = isPlaying ? '⏸' : '▶'
}

function buildWaveformPeaks(buffer, width) {
  const ch = buffer.getChannelData(0)
  const peaks = new Float32Array(width)
  const blockSize = Math.floor(ch.length / width)
  for (let i = 0; i < width; i++) {
    let max = 0
    const start = i * blockSize
    for (let j = 0; j < blockSize; j++) { const v = Math.abs(ch[start+j]||0); if (v>max) max=v }
    peaks[i] = max
  }
  return peaks
}

function drawWaveform(progress) {
  const canvas = document.getElementById('wfc')
  if (!canvas) return
  const dpr = window.devicePixelRatio || 1
  const W = canvas.offsetWidth, H = canvas.offsetHeight
  if (!W || !H) return
  if (canvas.width !== Math.round(W*dpr) || canvas.height !== Math.round(H*dpr)) {
    canvas.width = Math.round(W*dpr); canvas.height = Math.round(H*dpr)
    if (audioBuffer) waveformPeaks = buildWaveformPeaks(audioBuffer, canvas.width)
  }
  const ctx = canvas.getContext('2d')
  const w = canvas.width, h = canvas.height
  ctx.clearRect(0, 0, w, h)
  const mid = h / 2
  const playedX = Math.floor(progress * w)

  if (!waveformPeaks) {
    // Simple progress bar while waveform decodes
    ctx.fillStyle = 'rgba(255,255,255,.07)'
    ctx.fillRect(0, mid-3, w, 6)
    if (playedX > 0) { ctx.fillStyle = 'rgba(201,168,76,.7)'; ctx.fillRect(0, mid-3, playedX, 6) }
    if (playedX > 0 && playedX < w) { ctx.fillStyle = '#fff'; ctx.fillRect(playedX-1, 0, 2, h) }
    return
  }
  for (let x = 0; x < w; x++) {
    const peak = waveformPeaks[x] || 0
    const barH = Math.max(2, peak * mid * 0.9)
    ctx.fillStyle = x < playedX
      ? `rgba(201,168,76,${0.5 + peak * 0.5})`
      : `rgba(255,255,255,${0.06 + peak * 0.08})`
    ctx.fillRect(x, mid - barH, 1, barH * 2)
  }
  if (playedX > 0 && playedX < w) { ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.fillRect(playedX-1, 0, 2, h) }
}

async function decodeWaveformBg(song) {
  try {
    const resp = await fetch(toFetchUrl(song.previewUrl || song.shareUrl))
    if (!resp.ok) return
    const arrBuf = await resp.arrayBuffer()
    const ctx2 = new OfflineAudioContext(1, 44100, 44100)
    audioBuffer = await ctx2.decodeAudioData(arrBuf)
    const canvas = document.getElementById('wfc')
    if (canvas && audioBuffer) {
      waveformPeaks = buildWaveformPeaks(audioBuffer, canvas.width || 600)
    }
  } catch(e) { /* waveform optional */ }
}

// ── Seek ─────────────────────────────────────────────────────────────────────
function seekFromWaveform(e, canvas) {
  if (!audioEl) return
  const rect = canvas.getBoundingClientRect()
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left
  const dur = audioEl.duration || 0
  if (!dur) return
  const t = Math.max(0, Math.min((x / rect.width) * dur, dur - 0.01))
  drawWaveform(t / dur)
  const el = document.getElementById('tc'); if (el) el.textContent = fmt(t)
  audioEl._seekTarget = t
}

function commitSeek() {
  if (!audioEl || !isSeeking) return
  const t = audioEl._seekTarget ?? 0
  audioEl.currentTime = t
  if (!isPlaying) {
    audioEl.play().then(() => { isPlaying = true; startProgress(); updateBtn() }).catch(()=>{})
  }
  isSeeking = false
}

// ── Render ────────────────────────────────────────────────────────────────────
function pitchHtml() {
  // Only show pitch slider on submission links (no feedback panel)
  if (feedbackEnabled) return ''
  return `<div class="pitch-wrap">
    <div class="pitch-label">KEY — pitch shift</div>
    <div class="pitch-row">
      <button class="pitch-reset" onclick="resetPitch()">Reset</button>
      <input class="pitch-slider" id="ps" type="range" min="-12" max="12" step="1"
        value="${currentPitch}" oninput="setPitch(this.value)">
      <div class="pitch-val" id="pv">${currentPitch>0?'+'+currentPitch:currentPitch}</div>
    </div>
    <div class="pitch-note">semitones · reload song to apply</div>
  </div>`
}

function showLoading(song) {
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div><div class="loading-ring"></div><div class="loading-text">Loading...</div></div>
    ${pitchHtml()}`
}

function feedbackHtml(song) {
  if (!feedbackEnabled) return ''
  const code = song.code || ''
  const items = (feedback[code] || [])
  const itemsHtml = items.map((f,i) => `
    <div class="feedback-item">
      <span class="feedback-ts" onclick="seekToTime(${f.ts})" title="Click to seek">${fmt(f.ts)}</span>
      <span class="feedback-txt">${esc(f.text)}</span>
    </div>`).join('')
  return `<div class="feedback-panel">
    <div class="feedback-title">FEEDBACK</div>
    ${items.length ? `<div class="feedback-list">${itemsHtml}</div>` : ''}
    <div class="feedback-input-row">
      <input class="feedback-inp" id="fb-inp" placeholder="Write feedback at current time..." onkeydown="if(event.key==='Enter')submitFeedback('${esc(code)}')" />
      <button class="feedback-submit" onclick="submitFeedback('${esc(code)}')">→ Send</button>
    </div>
    <div class="feedback-sent" id="fb-sent" style="display:none">✓ Feedback sent!</div>
  </div>`
}

async function submitFeedback(code) {
  const inp = document.getElementById('fb-inp')
  if (!inp) return
  const text = inp.value.trim()
  if (!text) return
  const ts = audioEl ? Math.floor(audioEl.currentTime) : 0
  inp.value = ''
  if (!feedback[code]) feedback[code] = []
  feedback[code].push({ ts, text, at: new Date().toISOString() })
  // Save to Supabase
  try { await db.from('share_sessions').update({ feedback }).eq('id', sessionId) }
  catch(e) { console.warn('Feedback save failed:', e) }
  // Re-render only the feedback list area
  const list = document.querySelector('.feedback-list')
  const items = feedback[code] || []
  const newListHtml = items.map(f => `
    <div class="feedback-item">
      <span class="feedback-ts" onclick="seekToTime(${f.ts})" title="Click to seek">${fmt(f.ts)}</span>
      <span class="feedback-txt">${esc(f.text)}</span>
    </div>`).join('')
  if (list) {
    list.innerHTML = newListHtml
  } else {
    // Insert list above input row
    const row = document.querySelector('.feedback-input-row')
    if (row) {
      const div = document.createElement('div')
      div.className = 'feedback-list'
      div.innerHTML = newListHtml
      row.parentNode.insertBefore(div, row)
    }
  }
  const sent = document.getElementById('fb-sent')
  if (sent) { sent.style.display = 'block'; setTimeout(() => { sent.style.display = 'none' }, 2000) }
}

function seekToTime(ts) {
  if (!audioEl) return
  audioEl.currentTime = ts
  if (!isPlaying) {
    audioEl.play().then(() => { isPlaying = true; startProgress(); updateBtn() }).catch(()=>{})
  }
}

function showPlayer(song) {
  const dlDone = downloads[song.code] ? 'done' : ''
  const dlLabel = downloads[song.code] ? '✓ Downloaded' : '↓&nbsp;&nbsp;Download'
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div style="width:100%;max-width:600px">
      <div class="progress-outer" id="wf-wrap"><canvas class="waveform-canvas" id="wfc"></canvas></div>
      <div class="times"><span id="tc">0:00</span><span id="tdur">—:——</span></div>
    </div>
    <div class="controls">
      <button class="play-btn" id="pb" onclick="togglePlay()">⏸</button>
    </div>
    <button class="dl-btn ${dlDone}" id="dlb${currentIdx}" onclick="downloadSong(${currentIdx})">
      <span style="font-size:16px">↓</span> ${dlLabel}
    </button>
    ${pitchHtml()}
    ${feedbackHtml(song)}`

  const canvas = document.getElementById('wfc')
  requestAnimationFrame(() => {
    const dpr = window.devicePixelRatio || 1
    const W = canvas.offsetWidth, H = window.innerWidth < 640 ? 56 : 80
    canvas.width = Math.round(W*dpr); canvas.height = Math.round(H*dpr)
    canvas.style.width = W+'px'; canvas.style.height = H+'px'
    drawWaveform(0)
  })

  // Seek events
  const onDown = e => {
    if (!audioEl) return
    e.preventDefault(); isSeeking = true; stopProgress()
    seekFromWaveform(e, canvas)
  }
  const onMove = e => { if (!isSeeking) return; e.preventDefault(); seekFromWaveform(e, canvas) }
  const onUp   = () => { if (!isSeeking) return; commitSeek(); if (isPlaying) startProgress() }
  canvas.addEventListener('mousedown', onDown)
  window.addEventListener('mousemove', onMove)
  window.addEventListener('mouseup', onUp)
  canvas.addEventListener('touchstart', onDown, { passive: false })
  canvas.addEventListener('touchmove', onMove, { passive: false })
  canvas.addEventListener('touchend', onUp)
}

function showStemsPage(song) {
  // Hide rolodex, show stems download UI in player area
  document.querySelector('.rolodex-wrap').style.display = 'none'
  document.getElementById('player').innerHTML = `
    <div class="stems-page">
      <div class="stems-title">${esc(song.title || song.code)}</div>
      <div class="stems-sub">STEMS${song.stems_version ? ' ' + esc(song.stems_version) : ''}</div>
      <button class="stems-dl-btn" id="sdlb" onclick="downloadStems()">
        ↓ Download Stems
      </button>
      <div class="stems-dl-status" id="sdls"></div>
    </div>`
}

async function downloadStems() {
  const song = songs[0]; if (!song) return
  const btn = document.getElementById('sdlb')
  if (!btn) return
  btn.disabled = true; btn.textContent = '↓ Downloading...'
  try {
    // Build direct Dropbox dl link — no proxy needed for ZIPs
    let url = song.shareUrl || ''
    if (url.includes('dropbox.com')) {
      url = url.replace('www.dropbox.com', 'dl.dropboxusercontent.com')
        .replace(/[?&]dl=0/, '').replace(/[?&]dl=1/, '')
      url += (url.includes('?') ? '&' : '?') + 'dl=1'
    }
    const a = document.createElement('a')
    a.href = url
    a.download = song.filename || (song.title || song.code) + '.zip'
    a.target = '_blank'
    document.body.appendChild(a); a.click(); document.body.removeChild(a)
    btn.textContent = '✓ Downloaded'
    await db.from('share_sessions').update({
      downloads: { [song.code]: new Date().toISOString() }
    }).eq('id', sessionId)
  } catch(e) {
    btn.disabled = false; btn.textContent = '↓ Download Stems'
  }
}

function showErr(msg) {
  document.getElementById('player').innerHTML = `<div class="err-icon">⚠</div><div class="err-text">${esc(msg)}</div>${pitchHtml()}`
}
function showState(icon, title, msg) {
  document.getElementById('app').style.display = 'none'
  const s = document.getElementById('state'); s.style.display = 'flex'
  s.innerHTML = `<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-sub">${msg}</div>`
  document.getElementById('nav-title').textContent = title
}

function fmt(s) { const t=Math.max(0,Math.floor(s||0)); return Math.floor(t/60)+':'+(t%60+'').padStart(2,'0') }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

startStars(document.getElementById('space'))
init()
