<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#000;color:#f5f1ea;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
#space{position:fixed;inset:0;z-index:0;pointer-events:none}
nav{position:sticky;top:0;z-index:10;display:flex;align-items:center;padding:14px 20px;gap:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.16em;color:#c9a84c}
.nav-sep{color:#333}
.nav-title{font-family:'Space Mono',monospace;font-size:10px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-exp{font-family:'Space Mono',monospace;font-size:10px;color:#333}
.app{position:relative;z-index:1;display:flex;flex:1;overflow:hidden;height:calc(100vh - 49px)}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;background:rgba(0,0,0,.55)}
.sb-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.4);padding:10px 14px 6px;border-bottom:1px solid rgba(255,255,255,.05)}
.song-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.song-item:hover{background:rgba(255,255,255,.04)}
.song-item.active{background:rgba(201,168,76,.08);border-left:2px solid #c9a84c}
.song-num{font-family:'Space Mono',monospace;font-size:10px;color:#333;width:18px;flex-shrink:0}
.song-title-text{font-size:13px;color:#cec9c1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.song-dl-dot{font-family:'Space Mono',monospace;font-size:9px;color:#4caf82;flex-shrink:0;opacity:0;transition:opacity .3s}
.song-dl-dot.visible{opacity:1}
.song-dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a;flex-shrink:0;transition:all .3s}
.song-dot.on{background:#4caf82;box-shadow:0 0 8px #4caf82}
.player-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 40px;gap:24px;min-width:0;background:rgba(0,0,0,.45)}
.now-code{font-family:'Space Mono',monospace;font-size:10px;color:#444;text-align:center;margin-bottom:4px}
.now-title{font-size:24px;text-align:center;color:#f5f1ea;font-weight:300}
.progress-outer{width:100%;max-width:600px;position:relative;cursor:pointer;user-select:none}
.waveform-canvas{display:block;width:100%;height:80px;border-radius:4px}
.times{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:10px;color:#444;width:100%;max-width:600px;margin-top:6px}
.controls{display:flex;align-items:center;gap:28px}
.ctrl-btn{background:transparent;border:none;color:#444;font-size:16px;cursor:pointer;transition:color .15s;padding:4px}
.ctrl-btn:hover{color:#cec9c1}
.play-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-size:22px;cursor:pointer;color:#f5f1ea;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
.play-btn:hover{border-color:#c9a84c;color:#c9a84c;background:rgba(201,168,76,.08)}
.dl-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:10px 24px;background:rgba(76,175,130,.08);border:1px solid rgba(76,175,130,.4);color:#4caf82;border-radius:4px;cursor:pointer;letter-spacing:.08em;display:flex;align-items:center;gap:10px;transition:all .2s}
.dl-btn:hover{background:rgba(76,175,130,.15);border-color:#4caf82}
.dl-btn.loading{opacity:.5;cursor:default;pointer-events:none}
.dl-btn.done{border-color:rgba(76,175,130,.25);color:rgba(76,175,130,.5);background:transparent}
.pitch-wrap{width:100%;max-width:600px}
.pitch-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.5);text-align:center;margin-bottom:12px}
.pitch-row{display:flex;align-items:center;gap:16px}
.pitch-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:#c9a84c;width:40px;text-align:center}
.pitch-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(255,255,255,.1);outline:none;cursor:pointer;border-radius:2px}
.pitch-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer;box-shadow:0 0 8px rgba(201,168,76,.5)}
.pitch-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#c9a84c;cursor:pointer;border:none}
.pitch-reset{font-family:'Space Mono',monospace;font-size:10px;padding:4px 10px;background:transparent;border:1px solid rgba(255,255,255,.1);color:#444;border-radius:2px;cursor:pointer;transition:all .15s}
.pitch-reset:hover{border-color:#c9a84c;color:#c9a84c}
.pitch-note{font-family:'Space Mono',monospace;font-size:9px;color:#333;text-align:center;margin-top:8px}
.loading-ring{width:36px;height:36px;border:2px solid rgba(255,255,255,.08);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;font-size:11px;color:#555;text-align:center;margin-top:10px;letter-spacing:.06em}
.err-icon{font-size:36px;opacity:.2;text-align:center}
.err-text{font-family:'Space Mono',monospace;font-size:12px;color:#e05a4a;text-align:center}
.empty-hint{font-family:'Space Mono',monospace;font-size:11px;color:#333;text-align:center;letter-spacing:.08em}
.state{flex:1;position:relative;z-index:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px}
.state-icon{font-size:36px;opacity:.3}
.state-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#555}
.state-sub{font-size:13px;color:#333;text-align:center}
@media(max-width:640px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:120px;max-height:120px;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row;border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
  .sb-label{display:none}
  .song-item{flex-direction:column;min-width:80px;padding:8px 10px;gap:4px;border-bottom:none;border-right:1px solid rgba(255,255,255,.04)}
  .song-title-text{font-size:11px}
  .song-num{display:none}
  .player-area{padding:20px 16px;gap:18px}
  .now-title{font-size:18px}
  .dl-btn{padding:8px 16px;font-size:10px}
  .waveform-canvas{height:56px}
}
</style>

<body>
<canvas id="space"></canvas>
<nav>
  <span class="logo">LISTEN</span>
  <span class="nav-sep">·</span>
  <span class="nav-title" id="nav-title">Loading...</span>
  <span class="nav-exp" id="nav-exp"></span>
</nav>
<div class="app" id="app" style="display:none">
  <div class="sidebar">

  </div>

<script>
// ── Background switcher ───────────────────────────────────────────────────────
function setBackground(bg) {
  const c = document.getElementById('space')
  // Stop any existing animation by replacing canvas (clears all listeners)
  const fresh = c.cloneNode(false)
  c.parentNode.replaceChild(fresh, c)
  if (bg === 'void') { fresh.style.background = '#000'; return }
  if (bg === 'neon_pop')  startNeonStars(fresh, ['#ffdd00','#ff9900','#ffbb00','#ffee44','#ff8800'])
  else if (bg === 'neon_calm') startNeonStars(fresh, ['#00ff88','#44ddff','#00cc66','#88ffcc','#00aaff'])
  else if (bg === 'neon_rock') startNeonStars(fresh, ['#ff2244','#ff5566','#ffffff','#ff3355','#ffaaaa'])
  else if (bg === 'neon_elec') startNeonStars(fresh, ['#cc44ff','#9922ff','#ff44dd','#aa00ff','#dd88ff'])
  else if (bg === 'aurora') startAurora(fresh)
  else if (bg === 'rain') startRain(fresh)
  else if (bg === 'grid') startGrid(fresh)
  else startStars(fresh) // default: stars
}

function startAurora(c) {
  const ctx = c.getContext('2d')
  let W, H, t = 0, dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.04)'
    ctx.fillRect(0,0,W,H)
    for (let i = 0; i < 4; i++) {
      const hue = 140 + i*30 + Math.sin(t*0.3+i)*20
      const y = H*0.3 + Math.sin(t*0.2+i*1.5)*H*0.15
      const grd = ctx.createRadialGradient(W/2, y, 0, W/2, y, W*0.8)
      grd.addColorStop(0, `hsla(${hue},80%,50%,0.06)`)
      grd.addColorStop(1, 'transparent')
      ctx.fillStyle = grd; ctx.fillRect(0,0,W,H)
    }
    t += 0.015
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startRain(c) {
  const ctx = c.getContext('2d')
  let W, H, drops = [], dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false; drops=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,len:10+Math.random()*20,speed:4+Math.random()*6,alpha:0.1+Math.random()*0.3})) }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0,0,W,H)
    drops.forEach(d => {
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-1,d.y+d.len)
      ctx.strokeStyle = `rgba(180,220,255,${d.alpha})`; ctx.lineWidth = 0.8; ctx.stroke()
      d.y += d.speed
      if (d.y > H+d.len) { d.y = -d.len; d.x = Math.random()*W }
    })
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startGrid(c) {
  const ctx = c.getContext('2d')
  let W, H, t = 0, dirty = true, DPR = 1
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.width=W*DPR; c.height=H*DPR; c.style.width=W+'px'; c.style.height=H+'px'; ctx.scale(DPR,DPR); dirty=false }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H)
    const size = 60; const offset = (t * 0.5) % size
    ctx.strokeStyle = 'rgba(201,168,76,0.08)'; ctx.lineWidth = 0.5
    for (let x = -size+offset; x < W+size; x += size) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke()
    }
    const voffset = (t * 0.3) % size
    for (let y = -size+voffset; y < H+size; y += size) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke()
    }
    // Glow at intersections near center
    const cx = W/2, cy = H/2
    const grd = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6)
    grd.addColorStop(0,'rgba(201,168,76,0.04)'); grd.addColorStop(1,'transparent')
    ctx.fillStyle = grd; ctx.fillRect(0,0,W,H)
    t += 0.5; requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize,80) })
  resize(); draw()
}

function startNeonStars(c, palette) {
  const ctx = c.getContext('2d')
  let W = 0, H = 0, DPR = 1, stars = [], dirty = true
  const N = 280, SPEED = 0.42

  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() {
    c.style.width=W+'px'; c.style.height=H+'px'
    c.width=Math.round(W*DPR); c.height=Math.round(H*DPR)
    ctx.setTransform(DPR,0,0,DPR,0,0); dirty=false
  }
  function makeStar() {
    const hex = palette[Math.floor(Math.random()*palette.length)]
    const r = parseInt(hex.slice(1,3),16)
    const g = parseInt(hex.slice(3,5),16)
    const b = parseInt(hex.slice(5,7),16)
    return { x:(Math.random()-0.5)*2, y:(Math.random()-0.5)*2, z:Math.random(), pz:0, r, g, b }
  }

  function draw() {
    if (dirty) apply()
    ctx.fillStyle = 'rgba(0,0,0,0.14)'; ctx.fillRect(0,0,W,H)
    const cx=W/2, cy=H/2
    stars.forEach(s => {
      s.pz=s.z; s.z -= SPEED*0.01
      if (s.z<=0) { Object.assign(s,makeStar()); s.z=1; s.pz=1 }
      const sx=(s.x/s.z)*W+cx, sy=(s.y/s.z)*H+cy
      const px=(s.x/s.pz)*W+cx, py=(s.y/s.pz)*H+cy
      if (sx<-20||sx>W+20||sy<-20||sy>H+20) { Object.assign(s,makeStar()); return }
      const t = 1-s.z
      const size = Math.max(0.3, t*2.0)
      const alpha = 0.35 + t*0.65
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(sx,sy)
      ctx.strokeStyle = `rgba(${s.r},${s.g},${s.b},${alpha})`
      ctx.lineWidth = size; ctx.stroke()
      // glowing dot at tip for close stars
      if (t > 0.65) {
        ctx.beginPath(); ctx.arc(sx,sy,size*0.9,0,Math.PI*2)
        ctx.fillStyle = `rgba(${s.r},${s.g},${s.b},${alpha*0.7})`
        ctx.fill()
      }
    })
    requestAnimationFrame(draw)
  }

  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80)})
  resize(); stars=Array.from({length:N},makeStar); draw()
}

function startStars(c) {
  const ctx = c.getContext('2d')
  let W = 0, H = 0, DPR = 1, stars = [], dirty = true
  const N = 350, SPEED = 0.45
  function resize() { DPR = devicePixelRatio||1; W = innerWidth; H = innerHeight; dirty = true }
  function apply() { c.style.width=W+'px'; c.style.height=H+'px'; c.width=Math.round(W*DPR); c.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); dirty=false }
  function makeStar() { return {x:(Math.random()-0.5)*2,y:(Math.random()-0.5)*2,z:Math.random(),pz:0} }
  function draw() {
    if (dirty) apply()
    ctx.fillStyle='rgba(0,0,0,0.13)'; ctx.fillRect(0,0,W,H)
    const cx=W/2,cy=H/2
    stars.forEach(s => {
      s.pz=s.z; s.z-=SPEED*0.01
      if(s.z<=0){Object.assign(s,makeStar());s.z=1;s.pz=1}
      const sx=(s.x/s.z)*W+cx,sy=(s.y/s.z)*H+cy,px=(s.x/s.pz)*W+cx,py=(s.y/s.pz)*H+cy
      if(sx<-20||sx>W+20||sy<-20||sy>H+20){Object.assign(s,makeStar());return}
      const t=1-s.z; const size=Math.max(0.3,t*1.6); const alpha=0.3+t*0.7; const bright=Math.floor(180+t*75)
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(sx,sy)
      ctx.strokeStyle=`rgba(${bright},${bright},${Math.min(255,bright+30)},${alpha})`;ctx.lineWidth=size;ctx.stroke()
    })
    requestAnimationFrame(draw)
  }
  let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,80)})
  resize(); stars=Array.from({length:N},makeStar); draw()
}

// ── Audio ────────────────────────────────────────────────────────────────────
const SB_URL = 'https://ukqpnjgvjeduipmdaczn.supabase.co'
const SB_KEY = 'sb_publishable_4yMwlAo6OLpgGPN_6yWvIw_g5bnjnWS'
const { createClient } = window.supabase
const db = createClient(SB_URL, SB_KEY)

let songs = [], sessionId = null, currentIdx = -1
let isPlaying = false, progressTimer = null, currentPitch = 0
let tonePlayer = null, pitchNode = null
let audioBuffer = null, playOffset = 0, playStarted = 0
let downloads = {}

function toDirectUrl(u) {
  if (!u) return null
  if (u.includes('dl.dropboxusercontent.com')) return u
  return u.replace('www.dropbox.com','dl.dropboxusercontent.com').replace(/dl=0/,'dl=1')
    + (u.includes('dl=') ? '' : (u.includes('?') ? '&dl=1' : '?dl=1'))
}
function toFetchUrl(u) {
  if (!u) return null
  return '/api/audio?url=' + encodeURIComponent(toDirectUrl(u))
}

async function ensureAudio() {
  await Tone.start()
}

async function init() {
  const id = new URLSearchParams(location.search).get('s')
  if (!id) { showState('🔒','NO LINK','Open your personal listen link.'); return }
  sessionId = id
  const { data } = await db.from('share_sessions').select('*').eq('id', id).maybeSingle()
  if (!data) { showState('🔍','NOT FOUND','This link is invalid or expired.'); return }
  if (data.expires_at && new Date(data.expires_at) < new Date()) { showState('⏱','EXPIRED','Contact the producer for a new link.'); return }
  songs = data.songs || []
  downloads = data.downloads || {}
  document.getElementById('nav-title').textContent = data.patch_name || 'Demo Session'
  document.title = 'LISTEN — ' + (data.patch_name || 'Demo')
  setBackground(data.background || 'stars')
  const exp = data.expires_at ? Math.ceil((new Date(data.expires_at)-Date.now())/86400000) : null
  if (exp) document.getElementById('nav-exp').textContent = exp + 'd left'
  buildList()
  document.getElementById('app').style.display = 'flex'
}

function buildList() {
  document.getElementById('song-list').innerHTML = songs.map((s,i) => `
    <div class="song-item" id="si${i}" onclick="playSong(${i})">
      <span class="song-num">${String(i+1).padStart(2,'0')}</span>
      <div class="song-title-text">${esc(s.title||s.code)}</div>
      <span class="song-dl-dot ${downloads[s.code]?'visible':''}" title="Downloaded">↓</span>
      <div class="song-dot" id="sd${i}"></div>
    </div>`).join('')
}

function setActive(idx) {
  document.querySelectorAll('.song-item').forEach(el=>el.classList.remove('active'))
  document.querySelectorAll('.song-dot').forEach(el=>el.classList.remove('on'))
  if(idx>=0){ document.getElementById('si'+idx)?.classList.add('active'); document.getElementById('sd'+idx)?.classList.add('on') }
}

// ── Playback: fetch → decode → Tone.Player → PitchShift ──────────────────────
async function playSong(idx) {
  if (idx === currentIdx && audioBuffer) { togglePlay(); return }
  stopAll()
  currentIdx = idx
  setActive(idx)
  const song = songs[idx]
  showLoading(song)
  try {
    await ensureAudio()
    showLoadingText('Loading...')
    const resp = await fetch(toFetchUrl(song.shareUrl))
    if (!resp.ok) throw new Error('HTTP ' + resp.status)
    showLoadingText('Decoding...')
    const arrBuf = await resp.arrayBuffer()

    // Fresh AudioContext for decoding (Tone's ctx rejects decodeAudioData)
    const decodeCtx = new AudioContext()
    const decoded = await decodeCtx.decodeAudioData(arrBuf.slice(0))
    decodeCtx.close()
    audioBuffer = decoded

    // Tone.ToneAudioBuffer wraps the raw AudioBuffer so Tone.Player can use it
    const toneBuffer = new Tone.ToneAudioBuffer()
    toneBuffer._buffer = decoded

    // Chain: Tone.Player → Tone.PitchShift → output
    pitchNode = new Tone.PitchShift(currentPitch).toDestination()
    tonePlayer = new Tone.Player(toneBuffer).connect(pitchNode)
    tonePlayer.onstop = () => {
      if (isSeeking) return  // seek triggered stop — don't advance
      if (!isPlaying) return
      isPlaying = false; stopProgress(); updateBtn()
      if (currentIdx < songs.length - 1) playSong(currentIdx + 1)
    }

    showPlayer(song)
    tonePlayer.start()
    isPlaying = true
    playStarted = Tone.now()
    playOffset = 0
    startProgress()
    updateBtn()
  } catch(e) {
    console.error('playSong:', e)
    showErr(e.name + ': ' + (e.message || 'unknown'))
  }
}

function stopAll() {
  stopProgress()
  if (tonePlayer) { try { tonePlayer.stop(); tonePlayer.dispose() } catch(e){} tonePlayer = null }
  if (pitchNode) { try { pitchNode.dispose() } catch(e){} pitchNode = null }
  audioBuffer = null; isPlaying = false; playOffset = 0; playStarted = 0; waveformPeaks = null; isSeeking = false
}

function togglePlay() {
  if (!tonePlayer) return
  if (isPlaying) {
    // Save elapsed position before stopping
    playOffset = Math.min(playOffset + (Tone.now() - playStarted), audioBuffer?.duration || 0)
    tonePlayer.stop()
    isPlaying = false; stopProgress(); updateBtn()
  } else {
    // Resume from saved position
    tonePlayer.start(Tone.now(), playOffset)
    playStarted = Tone.now()   // ← reset to NOW, keep playOffset as the base
    isPlaying = true; startProgress(); updateBtn()
  }
}

function setPitch(v) {
  currentPitch = parseInt(v)
  const el = document.getElementById('pv')
  if (el) el.textContent = currentPitch > 0 ? '+' + currentPitch : currentPitch
  if (pitchNode) pitchNode.pitch = currentPitch
}
function resetPitch() { currentPitch=0; const s=document.getElementById('ps'); if(s)s.value=0; setPitch(0) }

// ── Download ─────────────────────────────────────────────────────────────────
async function downloadSong(idx) {
  const song = songs[idx]
  const btn = document.getElementById(`dlb${idx}`)
  if (!btn || btn.classList.contains('loading')) return
  btn.classList.add('loading'); btn.innerHTML = '<span>↓</span> Downloading...'
  try {
    const resp = await fetch(toFetchUrl(song.shareUrl))
    const blob = await resp.blob()
    const ext = (song.shareUrl||'').match(/\.(mp3|wav|m4a|flac|aiff|ogg)/i)?.[1] || 'mp3'
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob); a.download = (song.title||song.code)+'.'+ext; a.click()
    URL.revokeObjectURL(a.href)
    btn.classList.remove('loading'); btn.classList.add('done'); btn.innerHTML = '✓ Downloaded'
    document.querySelector(`#si${idx} .song-dl-dot`)?.classList.add('visible')
    downloads[song.code] = new Date().toISOString()
    await db.from('share_sessions').update({ downloads }).eq('id', sessionId)
  } catch(e) {
    btn.classList.remove('loading'); btn.innerHTML = '<span>↓</span> Download'
    alert('Download failed')
  }
}

// ── Waveform ──────────────────────────────────────────────────────────────────
let waveformPeaks = null  // Float32Array of peak values per pixel column

function buildWaveformPeaks(buffer, width) {
  const ch = buffer.getChannelData(0)
  const n = buffer.numberOfChannels > 1 ? buffer.getChannelData(1) : null
  const peaks = new Float32Array(width)
  const blockSize = Math.floor(ch.length / width)
  for (let i = 0; i < width; i++) {
    let max = 0
    const start = i * blockSize
    for (let j = 0; j < blockSize; j++) {
      const l = Math.abs(ch[start + j] || 0)
      const r = n ? Math.abs(n[start + j] || 0) : l
      const v = Math.max(l, r)
      if (v > max) max = v
    }
    peaks[i] = max
  }
  return peaks
}

function drawWaveform(progress) {
  const canvas = document.getElementById('wfc')
  if (!canvas || !waveformPeaks) return
  const dpr = window.devicePixelRatio || 1
  const W = canvas.offsetWidth, H = canvas.offsetHeight
  if (canvas.width !== W * dpr || canvas.height !== H * dpr) {
    canvas.width = W * dpr; canvas.height = H * dpr
    waveformPeaks = buildWaveformPeaks(audioBuffer, W * dpr)
  }
  const ctx = canvas.getContext('2d')
  const w = canvas.width, h = canvas.height
  ctx.clearRect(0, 0, w, h)

  const mid = h / 2
  const playedX = Math.floor(progress * w)

  for (let x = 0; x < w; x++) {
    const peak = waveformPeaks[x] || 0
    // Scale: max amplitude = 90% of half-height, with a minimum bar height
    const barH = Math.max(2, peak * mid * 0.9)
    const played = x < playedX

    // Color gradient: played = gold, unplayed = dark
    if (played) {
      // Gold with slight brightness variation based on peak
      const brightness = 0.5 + peak * 0.5
      ctx.fillStyle = `rgba(201,168,76,${brightness})`
    } else {
      ctx.fillStyle = `rgba(255,255,255,${0.06 + peak * 0.08})`
    }
    ctx.fillRect(x, mid - barH, 1, barH * 2)
  }

  // Playhead line
  if (playedX > 0 && playedX < w) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)'
    ctx.fillRect(playedX - 1, 0, 2, h)
  }
}

let isSeeking = false  // prevents onstop from advancing song during seek

function seekFromWaveform(e, canvas) {
  if (!audioBuffer) return
  const rect = canvas.getBoundingClientRect()
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left
  const offset = Math.max(0, Math.min((x / rect.width) * audioBuffer.duration, audioBuffer.duration - 0.01))
  // Just update visuals while dragging — only restart playback on release
  playOffset = offset
  drawWaveform(offset / audioBuffer.duration)
  const t = document.getElementById('tc'); if (t) t.textContent = fmt(offset)
}

function commitSeek() {
  if (!isSeeking) return
  // keep isSeeking=true while stop fires so onstop is guarded
  if (isPlaying && tonePlayer) {
    tonePlayer.stop()
    tonePlayer.start(Tone.now(), playOffset)
    playStarted = Tone.now()   // ← same fix: reset to NOW
  }
  isSeeking = false  // clear AFTER stop so onstop guard catches it
}

// ── Progress ─────────────────────────────────────────────────────────────────
function startProgress() { stopProgress(); progressTimer = setInterval(tick, 80) }
function stopProgress() { if(progressTimer){clearInterval(progressTimer);progressTimer=null} }
function tick() {
  if (!audioBuffer || !tonePlayer) return
  const elapsed = Math.min(Tone.now() - playStarted + playOffset, audioBuffer.duration)
  const progress = elapsed / audioBuffer.duration
  drawWaveform(progress)
  const t = document.getElementById('tc'); if(t) t.textContent = fmt(elapsed)
}
function updateBtn() { const b=document.getElementById('pb'); if(b) b.textContent=isPlaying?'⏸':'▶' }

// ── Render ────────────────────────────────────────────────────────────────────
function pitchHtml() {
  return `<div class="pitch-wrap">
    <div class="pitch-label">KEY — pitch shift</div>
    <div class="pitch-row">
      <button class="pitch-reset" onclick="resetPitch()">Reset</button>
      <input class="pitch-slider" id="ps" type="range" min="-12" max="12" step="1"
        value="${currentPitch}" oninput="setPitch(this.value)">
      <div class="pitch-val" id="pv">${currentPitch>0?'+'+currentPitch:currentPitch}</div>
    </div>
    <div class="pitch-note">semitones · tempo unchanged</div>
  </div>`
}

function showLoading(song) {
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div><div class="loading-ring"></div><div class="loading-text" id="ltxt">Loading...</div></div>
    ${pitchHtml()}`
}
function showLoadingText(t) { const e=document.getElementById('ltxt'); if(e) e.textContent=t }

function showPlayer(song) {
  const dur = fmt(audioBuffer?.duration || 0)
  const dlDone = downloads[song.code] ? 'done' : ''
  const dlLabel = downloads[song.code] ? '✓ Downloaded' : '↓&nbsp;&nbsp;Download'
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div style="width:100%;max-width:600px">
      <div class="progress-outer" id="wf-wrap">
        <canvas class="waveform-canvas" id="wfc"></canvas>
      </div>
      <div class="times"><span id="tc">0:00</span><span>${dur}</span></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="if(currentIdx>0)playSong(currentIdx-1)">◀◀</button>
      <button class="play-btn" id="pb" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="if(currentIdx<songs.length-1)playSong(currentIdx+1)">▶▶</button>
    </div>
    <button class="dl-btn ${dlDone}" id="dlb${currentIdx}" onclick="downloadSong(${currentIdx})">
      <span style="font-size:16px">↓</span> ${dlLabel}
    </button>
    ${pitchHtml()}`

  // Wire up waveform canvas events
  const canvas = document.getElementById('wfc')
  const wrap = document.getElementById('wf-wrap')
  // Build peaks and draw initial state
  requestAnimationFrame(() => {
    const dpr = window.devicePixelRatio || 1
    const W = canvas.offsetWidth
    canvas.width = W * dpr; canvas.height = (window.innerWidth < 640 ? 56 : 80) * dpr
    canvas.style.width = W + 'px'
    canvas.style.height = (window.innerWidth < 640 ? 56 : 80) + 'px'
    waveformPeaks = buildWaveformPeaks(audioBuffer, W * dpr)
    drawWaveform(0)
  })

  // Click / touch to seek — mousedown starts, window mouseup commits
  const onDown = e => {
    if (!audioBuffer) return
    e.preventDefault()
    isSeeking = true
    stopProgress()  // pause tick while scrubbing
    seekFromWaveform(e, canvas)
  }
  const onMove = e => {
    if (!isSeeking) return
    e.preventDefault()
    seekFromWaveform(e, canvas)
  }
  const onUp = () => {
    if (!isSeeking) return
    commitSeek()
    if (isPlaying) startProgress()
  }
  canvas.addEventListener('mousedown', onDown)
  window.addEventListener('mousemove', onMove)
  window.addEventListener('mouseup', onUp)
  canvas.addEventListener('touchstart', onDown, { passive: false })
  canvas.addEventListener('touchmove', onMove, { passive: false })
  canvas.addEventListener('touchend', onUp)

  // Redraw on window resize
  window.addEventListener('resize', () => {
    if (!audioBuffer || !document.getElementById('wfc')) return
    const c = document.getElementById('wfc')
    const dpr = window.devicePixelRatio || 1
    const W = c.offsetWidth
    c.width = W * dpr; c.height = (window.innerWidth < 640 ? 56 : 80) * dpr
    waveformPeaks = buildWaveformPeaks(audioBuffer, W * dpr)
    const elapsed = isPlaying ? Math.min(Tone.now() - playStarted + playOffset, audioBuffer.duration) : playOffset
    drawWaveform(elapsed / audioBuffer.duration)
  }, { once: true })
}
function showErr(msg) {
  document.getElementById('player').innerHTML = `<div class="err-icon">⚠</div><div class="err-text">${msg}</div>${pitchHtml()}`
}
function showState(icon,title,msg) {
  document.getElementById('app').style.display='none'
  const s=document.getElementById('state'); s.style.display='flex'
  s.innerHTML=`<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-sub">${msg}</div>`
  document.getElementById('nav-title').textContent=title
}
function fmt(s){const t=Math.max(0,Math.floor(s||0));return Math.floor(t/60)+':'+(t%60+'').padStart(2,'0')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

startStars(document.getElementById('space'))
init()
</script>
</body>
