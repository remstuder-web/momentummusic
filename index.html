<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LISTEN</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#f5f1ea;font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column}
nav{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #1a1a1a;gap:12px;position:sticky;top:0;z-index:10;background:#0a0a0a}
.logo{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.16em;color:#c9a84c}
.nav-sep{color:#333}
.nav-title{font-family:'Space Mono',monospace;font-size:10px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-exp{font-family:'Space Mono',monospace;font-size:10px;color:#333}
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid #1a1a1a;overflow-y:auto}
.sb-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.4);padding:10px 14px 6px;border-bottom:1px solid #111}
.song-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #0f0f0f}
.song-item:hover{background:#111}
.song-item.active{background:rgba(201,168,76,.06);border-left:2px solid #c9a84c}
.song-num{font-family:'Space Mono',monospace;font-size:10px;color:#333;width:18px;flex-shrink:0}
.song-title{font-size:13px;color:#cec9c1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.song-dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a;flex-shrink:0;margin-left:auto}
.song-dot.on{background:#4caf82;box-shadow:0 0 5px #4caf82}
.player-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 40px;gap:28px;min-width:0}
.now-code{font-family:'Space Mono',monospace;font-size:10px;color:#444;text-align:center;margin-bottom:6px}
.now-title{font-size:22px;text-align:center;color:#f5f1ea}
.progress-outer{width:100%;max-width:480px;height:3px;background:#1c1c1c;border-radius:2px;cursor:pointer}
.progress-fill{height:100%;background:#c9a84c;border-radius:2px;transition:width .1s linear}
.times{display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:10px;color:#444;width:100%;max-width:480px;margin-top:5px}
.controls{display:flex;align-items:center;gap:24px}
.ctrl-btn{background:transparent;border:none;color:#555;font-size:16px;cursor:pointer}
.ctrl-btn:hover{color:#cec9c1}
.play-btn{width:56px;height:56px;border-radius:50%;background:#1c1c1c;border:1px solid #303030;font-size:20px;cursor:pointer;color:#f5f1ea;display:flex;align-items:center;justify-content:center}
.play-btn:hover{border-color:#c9a84c;color:#c9a84c}
.pitch-wrap{width:100%;max-width:480px}
.pitch-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(201,168,76,.4);text-align:center;margin-bottom:10px}
.pitch-row{display:flex;align-items:center;gap:14px}
.pitch-val{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:#c9a84c;width:36px;text-align:center}
.pitch-slider{flex:1;-webkit-appearance:none;appearance:none;height:3px;background:#1c1c1c;outline:none;cursor:pointer;border-radius:2px}
.pitch-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#c9a84c;cursor:pointer}
.pitch-slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#c9a84c;cursor:pointer;border:none}
.pitch-reset{font-family:'Space Mono',monospace;font-size:10px;padding:3px 8px;background:transparent;border:1px solid #252525;color:#444;border-radius:2px;cursor:pointer}
.pitch-reset:hover{border-color:#c9a84c;color:#c9a84c}
.loading-ring{width:36px;height:36px;border:2px solid #1c1c1c;border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;font-size:11px;color:#444;text-align:center;margin-top:8px}
.err-icon{font-size:36px;opacity:.25;text-align:center}
.err-text{font-family:'Space Mono',monospace;font-size:11px;color:#e05a4a;text-align:center;margin-top:8px}
.empty-hint{font-family:'Space Mono',monospace;font-size:11px;color:#333;text-align:center}
.state-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px}
.state-icon{font-size:36px;opacity:.3}
.state-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#555}
.state-sub{font-size:13px;color:#333;text-align:center;line-height:1.7}
@media(max-width:600px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:110px;border-right:none;border-bottom:1px solid #1a1a1a;overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:row}
  .sb-label{display:none}
  .song-item{flex-direction:column;min-width:80px;padding:8px 10px;border-bottom:none;border-right:1px solid #0f0f0f;text-align:center;gap:4px}
  .song-num{display:none}
  .song-dot{margin:0 auto}
  .player-area{padding:20px 16px;gap:18px}
  .now-title{font-size:17px}
  .play-btn{width:50px;height:50px;font-size:18px}
}
</style>
</head>
<body>
<nav>
  <span class="logo">LISTEN</span>
  <span class="nav-sep">·</span>
  <span class="nav-title" id="nav-title">Loading...</span>
  <span class="nav-exp" id="nav-exp"></span>
</nav>
<div class="app" id="app" style="display:none">
  <div class="sidebar"><div class="sb-label">DEMOS</div><div id="song-list"></div></div>
  <div class="player-area" id="player">
    <div class="empty-hint">← SELECT A DEMO</div>
  </div>
</div>
<div class="state-screen" id="state" style="display:none"></div>

<audio id="audio-el" preload="none" style="display:none"></audio>

<script>
const SB_URL = 'https://ukqpnjgvjeduipmdaczn.supabase.co'
const SB_KEY = 'sb_publishable_4yMwlAo6OLpgGPN_6yWvIw_g5bnjnWS'
const { createClient } = window.supabase
const db = createClient(SB_URL, SB_KEY)

const audioEl = document.getElementById('audio-el')
let songs = [], currentIdx = -1, isPlaying = false, progressTimer = null, currentPitch = 0

// Convert Dropbox share URL to direct streaming URL for <audio> element
function toDirectUrl(u) {
  if (!u) return null
  if (u.includes('dl.dropboxusercontent.com')) return u  // already direct
  // Convert www.dropbox.com share link → direct CDN URL
  return u
    .replace('www.dropbox.com', 'dl.dropboxusercontent.com')
    .replace(/[?&]dl=0/, m => m.replace('dl=0','dl=1'))
    + (u.includes('dl=') ? '' : (u.includes('?') ? '&dl=1' : '?dl=1'))
}

// Load session
async function init() {
  const id = new URLSearchParams(location.search).get('s')
  if (!id) { showState('🔒','NO LINK','Open your personal listen link.'); return }
  const { data } = await db.from('share_sessions').select('*').eq('id', id).maybeSingle()
  if (!data) { showState('🔍','NOT FOUND','This link is invalid or expired.'); return }
  if (data.expires_at && new Date(data.expires_at) < new Date()) { showState('⏱','EXPIRED','Ask the producer for a new link.'); return }
  songs = data.songs || []
  document.getElementById('nav-title').textContent = data.patch_name || 'Demo Session'
  document.title = 'LISTEN — ' + (data.patch_name || 'Demo')
  const exp = data.expires_at ? Math.ceil((new Date(data.expires_at)-Date.now())/86400000) : null
  if (exp) document.getElementById('nav-exp').textContent = exp + 'd left'
  buildList()
  document.getElementById('app').style.display = 'flex'
}

function buildList() {
  document.getElementById('song-list').innerHTML = songs.map((s,i) =>
    `<div class="song-item" id="si${i}" onclick="playSong(${i})">
      <span class="song-num">${String(i+1).padStart(2,'0')}</span>
      <div class="song-title">${esc(s.title||s.code)}</div>
      <div class="song-dot" id="sd${i}"></div>
    </div>`
  ).join('')
}

function setActive(idx) {
  document.querySelectorAll('.song-item').forEach(el=>el.classList.remove('active'))
  document.querySelectorAll('.song-dot').forEach(el=>el.classList.remove('on'))
  if(idx>=0){ document.getElementById('si'+idx)?.classList.add('active'); document.getElementById('sd'+idx)?.classList.add('on') }
}

async function playSong(idx) {
  if (idx === currentIdx && audioEl.src) { togglePlay(); return }
  stop()
  currentIdx = idx
  setActive(idx)
  const song = songs[idx]
  showLoading(song)

  const url = toDirectUrl(song.shareUrl)
  if (!url) { showErr('No audio URL'); return }

  audioEl.src = url

  audioEl.oncanplay = () => {
    showPlayer(song)
    audioEl.play().then(() => {
      isPlaying = true
      startProgress()
    }).catch(e => showErr('Tap play to start'))
  }
  audioEl.onerror = () => showErr('Could not load — link may have expired')
  audioEl.onended = () => { isPlaying=false; stopProgress(); updateBtn(); if(idx<songs.length-1) playSong(idx+1) }
  audioEl.load()
}

function togglePlay() {
  if (!audioEl.src) return
  if (isPlaying) {
    audioEl.pause(); isPlaying=false; stopProgress(); updateBtn()
  } else {
    audioEl.play().then(()=>{isPlaying=true;startProgress();updateBtn()}).catch(()=>{})
  }
}

function stop() {
  stopProgress(); audioEl.pause(); audioEl.src=''; audioEl.oncanplay=null; audioEl.onerror=null; isPlaying=false
}

function startProgress() { stopProgress(); progressTimer=setInterval(tick,200) }
function stopProgress() { if(progressTimer){clearInterval(progressTimer);progressTimer=null} }
function tick() {
  if(!audioEl.duration) return
  const pct = audioEl.currentTime/audioEl.duration*100
  const f=document.getElementById('pf'); if(f) f.style.width=pct+'%'
  const c=document.getElementById('tc'); if(c) c.textContent=fmt(audioEl.currentTime)
}
function updateBtn() { const b=document.getElementById('pb'); if(b) b.textContent=isPlaying?'⏸':'▶' }

function setPitch(v) {
  currentPitch=parseInt(v)
  const l=document.getElementById('pv'); if(l) l.textContent=currentPitch>0?'+'+currentPitch:currentPitch
  // playbackRate changes pitch+tempo together — best available without Web Audio CORS
  audioEl.playbackRate = Math.pow(2, currentPitch/12)
}
function resetPitch() { currentPitch=0; const s=document.getElementById('ps'); if(s)s.value=0; setPitch(0) }

function seek(e, el) {
  if(!audioEl.duration) return
  audioEl.currentTime = (e.clientX-el.getBoundingClientRect().left)/el.offsetWidth * audioEl.duration
}

function pitchHtml() {
  return `<div class="pitch-wrap">
    <div class="pitch-label">KEY (pitch + tempo)</div>
    <div class="pitch-row">
      <button class="pitch-reset" onclick="resetPitch()">Reset</button>
      <input class="pitch-slider" id="ps" type="range" min="-6" max="6" step="1" value="${currentPitch}" oninput="setPitch(this.value)">
      <div class="pitch-val" id="pv">${currentPitch>0?'+'+currentPitch:currentPitch}</div>
    </div>
  </div>`
}

function showLoading(song) {
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div><div class="loading-ring"></div><div class="loading-text">Loading...</div></div>
    ${pitchHtml()}`
}

function showPlayer(song) {
  document.getElementById('player').innerHTML = `
    <div><div class="now-code">${esc(song.code||'')}</div><div class="now-title">${esc(song.title||song.code)}</div></div>
    <div style="width:100%;max-width:480px">
      <div class="progress-outer" onclick="seek(event,this)"><div class="progress-fill" id="pf" style="width:0%"></div></div>
      <div class="times"><span id="tc">0:00</span><span>${fmt(audioEl.duration)}</span></div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="if(currentIdx>0)playSong(currentIdx-1)">◀◀</button>
      <button class="play-btn" id="pb" onclick="togglePlay()">⏸</button>
      <button class="ctrl-btn" onclick="if(currentIdx<songs.length-1)playSong(currentIdx+1)">▶▶</button>
    </div>
    ${pitchHtml()}`
}

function showErr(msg) {
  document.getElementById('player').innerHTML = `
    <div class="err-icon">⚠</div>
    <div class="err-text">${msg}</div>
    ${pitchHtml()}`
}

function showState(icon,title,msg) {
  document.getElementById('app').style.display='none'
  const s=document.getElementById('state'); s.style.display='flex'
  s.innerHTML=`<div class="state-icon">${icon}</div><div class="state-title">${title}</div><div class="state-sub">${msg}</div>`
  document.getElementById('nav-title').textContent=title
}

function fmt(s) { const t=Math.max(0,Math.floor(s||0)); return Math.floor(t/60)+':'+(t%60+'').padStart(2,'0') }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

init()
</script>
</body>
</html>
